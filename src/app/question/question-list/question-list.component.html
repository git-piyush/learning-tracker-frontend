<!-- Enhanced Question List Page -->
<!-- All Angular bindings preserved exactly as original -->

<div class="product-page">
  <p class="message" *ngIf="message">{{ message }}</p>

  <!-- PRODUCT HEADER -->
  <div class="product-header">
    <div class="header-left">
      <span class="header-eyebrow">Repository</span>
      <h1>Question List</h1>
    </div>
    <button class="add-product-btn" (click)="navigateToAddQuestionPage()">
      <span class="btn-icon">+</span>
      Add New Question
    </button>
  </div>

    <!-- Search Form -->
  <div class="search-form">
    <select [(ngModel)]="searchForm.category" name="category" (change)="onChangeCategory($event)" required>
      <option value="">Select Category</option>
      <option *ngFor="let cat of categoryList" [value]="cat">{{cat}}</option>
    </select>
    <select [(ngModel)]="searchForm.subCategory" name="subCategory" (change)="loadQuestions()" required>
      <option value="">Select a Sub Category</option>
      <option *ngFor="let subCategory of subCategoryList" [value]="subCategory">{{ subCategory }}</option>
    </select>
    <select [(ngModel)]="searchForm.type" name="type" (change)="loadQuestions()">
      <option value="">Type</option>
      <option value="theory">Theoretical</option>
      <option value="practical">Hands On</option>
    </select>
    <select [(ngModel)]="searchForm.bookmark" name="bookmark" (change)="loadQuestions()">
      <option value="">Bookmarked</option>
      <option value="Y">Yes</option>
      <option value="N">No</option>
    </select>

    <div class="search-actions">
      <!--<button class="search-btn" (click)="search()">Search</button> -->
      <button class="reset-btn" (click)="resetSearch()">Reset</button>
    </div>
  </div>

  <!-- PRODUCT LIST -->
  <div class="product-list" *ngIf="products.length > 0">
    <div class="product-item" *ngFor="let product of products">

      <div class="product-image-wrap">
        <img [src]="getImageSrc(product.image)"
             [alt]="product.category"
             class="product-image"/>
        <div class="image-overlay"></div>
      </div>

      <div class="product-body">
        <div class="product-info">
          <h3 class="name">{{ product.question }}</h3>
          <div class="meta-row">
            <span class="meta-badge">{{ product.type }}</span>
            <span class="meta-badge level">{{ product.level }}</span>
          </div>
          <p class="modified">{{ product.modifiedDate | date:'dd MMM, yyyy' }}</p>
        </div>

        <!-- PRODUCT ACTIONS -->
        <div class="product-actions">
          <button (click)="navigateToViewQuestionDetails(product.id)" class="view-btn">View</button>
          <button (click)="navigateToEditProductPage(product.id)" class="edt-btn">Edit</button>
          <button (click)="deleteQuestion(product.id)" class="delete-btn">Delete</button>
        </div>
      </div>

    </div>
  </div>

  <div class="empty-state" *ngIf="products.length === 0">
    <p>No questions found.</p>
  </div>
</div>

<div class="pagination">

  <!-- First -->
  <button (click)="changePage(0)" [disabled]="page === 0" title="First page">
    First
  </button>

  <!-- Prev -->
  <button (click)="changePage(page - 1)" [disabled]="page === 0">
    ← Prev
  </button>

  <!-- Page info -->
  <span>Page {{ page + 1 }} of {{ totalPages }}</span>

  <!-- Next -->
  <button (click)="changePage(page + 1)" [disabled]="page + 1 >= totalPages">
    Next →
  </button>

  <!-- Last -->
  <button (click)="changePage(totalPages - 1)" [disabled]="page + 1 >= totalPages" title="Last page">
    Last
  </button>

  <!-- Go-to-page input -->
  <label class="page-size-label">
    Go to:
    <input
      type="number"
      class="goto-input"
      [min]="1"
      [max]="totalPages"
      [value]="page + 1"
      (keyup.enter)="goToPage(gotoInput.value)"
      (blur)="goToPage(gotoInput.value)"
      #gotoInput />
  </label>

  <!-- Page size -->
  <label class="page-size-label">
    Page Size:
    <select (change)="changeSize($event)" [value]="size">
      <option *ngFor="let s of [5, 10, 20]" [value]="s">{{ s }}</option>
    </select>
  </label>

</div>
