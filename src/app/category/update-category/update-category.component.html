<!-- Enhanced Update Category Page -->
<!-- All Angular bindings preserved exactly as original -->

<div class="purchase-form-page">
  <p *ngIf="message" class="message">{{ message }}</p>

  <div class="form-header">
    <span class="form-eyebrow">Edit Record</span>
    <h1>Update Category</h1>
  </div>

  <form (ngSubmit)="handleSubmit()" class="category-form">

    <!-- Two-column row: Category + Sub Category -->
    <div class="form-row">
      <div class="form-group">
        <label>Select Category</label>
        <select name="category" (change)="onChangeCategory($event)" [(ngModel)]="formData.category">
          <option value="">Select a category</option>
          <option *ngFor="let category of categoryList" [value]="category">{{ category }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Select Sub Category</label>
        <select name="subCategory" [(ngModel)]="formData.subCategory" id="subCategory">
          <option value="">Select Sub Category</option>
          <option *ngFor="let subCategory of subCategoryList" [value]="subCategory">{{ subCategory }}</option>
        </select>
      </div>
    </div>

    <!-- Two-column row: Ref Code + Ref Code Long Name -->
    <div class="form-row">
      <div class="form-group">
        <label>Reference Code</label>
        <input type="text" [(ngModel)]="formData.refCode" name="refCode" placeholder="e.g. JBACS" />
      </div>

      <div class="form-group">
        <label>Ref Code Long Name</label>
        <input type="text" [(ngModel)]="formData.refCodeLongName" name="refCodeLongName" placeholder="e.g. Java Basics" />
      </div>
    </div>

    <!-- Active -->
    <div class="form-group half">
      <label>Active</label>
      <select name="active" [(ngModel)]="formData.active">
        <option value="">Active / Inactive</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    </div>

    <div class="button-group">
      <button type="submit" class="btn btn-primary">Update Category</button>
    </div>

  </form>
</div>
